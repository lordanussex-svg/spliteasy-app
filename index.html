<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="SplitKira — Split bills fairly. Local-only, AES-256 encrypted. No account needed.">
<meta name="apple-mobile-web-app-title" content="SplitKira">
<meta name="theme-color" content="#0d0d1a">
<link rel="manifest" href="manifest.json">
<title>SplitKira</title>
<style>
:root{--bg:#0d0d1a;--card:#161628;--card2:#1e1e35;--border:#2a2a45;--text:#f0f0ff;--text2:#7777aa;
  --accent:#7c6fee;--accent2:#5b4fcf;--danger:#ef4444;--success:#22c55e;--warn:#f59e0b;--radius:14px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overscroll-behavior:none}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
#header{position:sticky;top:0;z-index:100;background:rgba(13,13,26,0.92);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:11px 15px 9px;display:flex;align-items:center;gap:9px}
.hdr-back{width:31px;height:31px;border-radius:8px;border:1.5px solid var(--border);background:var(--card2);
  color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-mid{flex:1;min-width:0}
#hdr-title{font-size:1.05rem;font-weight:700;letter-spacing:-0.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#hdr-sub{font-size:0.68rem;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.hdr-btn{width:31px;height:31px;border-radius:8px;border:1.5px solid var(--border);background:var(--card2);
  color:var(--text);font-size:0.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
#content{flex:1;overflow-y:auto;padding:13px 13px 94px;-webkit-overflow-scrolling:touch}
#bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:rgba(13,13,26,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);display:none;justify-content:space-around;align-items:center;
  padding:5px 0 calc(5px + env(safe-area-inset-bottom));z-index:200}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;border:none;
  background:none;color:var(--text2);cursor:pointer;font-size:0.57rem;font-weight:600;letter-spacing:0.3px;
  text-transform:uppercase;border-radius:9px;transition:color .15s;user-select:none;min-width:50px}
.nav-btn .ico{font-size:1.25rem;line-height:1}
.nav-btn.active{color:var(--accent)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card-sm{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px}
.row{display:flex;gap:8px;margin-bottom:10px}.row>.card-sm{flex:1;min-width:0}
.label{font-size:0.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.val-sm{font-size:1rem;font-weight:700}
.sec-title{font-size:0.78rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;
  margin:15px 0 8px;display:flex;align-items:center;gap:6px}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:0.68rem;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--card2)}
.badge.danger{background:rgba(239,68,68,0.15);color:#ef4444}.badge.success{background:rgba(34,197,94,0.15);color:#22c55e}
.badge.warn{background:rgba(245,158,11,0.15);color:#f59e0b}.badge.accent{background:rgba(124,111,238,0.2);color:var(--accent)}
.btn{display:block;width:100%;padding:11px;border-radius:12px;border:none;font-size:0.9rem;font-weight:700;cursor:pointer;transition:opacity .15s;user-select:none}
.btn:active{opacity:0.75}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-outline-accent{background:rgba(124,111,238,0.1);border:1.5px solid var(--accent);color:var(--accent)}
.btn-danger{background:rgba(239,68,68,0.1);color:#ef4444;border:1.5px solid rgba(239,68,68,0.3)}
.btn-sm{width:auto;padding:6px 12px;font-size:0.78rem}
.btn-icon{width:31px;height:31px;padding:0;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:0.88rem}
.btn-row{display:flex;gap:7px;margin-top:8px}.btn-row .btn{flex:1}
.field{margin-bottom:10px}
.field label{display:block;font-size:0.68rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px}
input,select,textarea{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;
  padding:9px 11px;color:var(--text);font-size:0.9rem;outline:none;-webkit-appearance:none;appearance:none;transition:border .15s;font-family:inherit}
input:focus,select:focus{border-color:var(--accent)}
input[type=date]{color-scheme:dark}input[type=file]{font-size:0.8rem;padding:7px}
select option{background:#1e1e35}
.field-row{display:flex;gap:8px}.field-row .field{flex:1;min-width:0}
.split-opts{display:flex;gap:6px;margin-bottom:9px}
.split-btn{flex:1;padding:8px 3px;border-radius:9px;border:1.5px solid var(--border);background:var(--card2);
  color:var(--text2);font-size:0.68rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.split-btn.active{border-color:var(--accent);background:rgba(124,111,238,0.15);color:var(--accent)}
.mbr-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.mbr-chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--card2);cursor:pointer;font-size:0.76rem;font-weight:600;transition:all .15s;user-select:none}
.mbr-chip.on{border-color:var(--accent);background:rgba(124,111,238,0.15);color:var(--accent)}
.mbr-chip .chip-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .15s}
.mbr-chip.on .chip-dot{background:var(--accent)}
.txn{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)}.txn:last-child{border-bottom:none}
.txn-ico{width:35px;height:35px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0}
.txn-info{flex:1;min-width:0}
.txn-desc{font-size:0.84rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-meta{font-size:0.67rem;color:var(--text2);margin-top:2px}
.txn-amt{font-size:0.88rem;font-weight:700;text-align:right;flex-shrink:0}
.txn-amt .split{font-size:0.64rem;color:var(--text2);font-weight:400}
.owe-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}.owe-row:last-child{border-bottom:none}
.progress{height:5px;border-radius:3px;background:var(--border);margin:4px 0}
.progress-fill{height:100%;border-radius:3px;transition:width .5s}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:300;display:none;align-items:flex-end;justify-content:center}
#overlay.show{display:flex}
#modal-box{width:100%;max-width:480px;background:var(--card);border-radius:20px 20px 0 0;
  padding:17px 17px calc(17px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto}
.modal-handle{width:34px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 11px}
.modal-title{font-size:0.98rem;font-weight:700;margin-bottom:11px}
#toast-wrap{position:fixed;bottom:calc(83px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:500;width:calc(100% - 26px);max-width:390px}
.toast{padding:9px 13px;border-radius:11px;margin-bottom:6px;font-size:0.79rem;font-weight:600;text-align:center;animation:slideUp .25s ease;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.toast.ok{background:rgba(34,197,94,0.93);color:#fff}.toast.err{background:rgba(239,68,68,0.93);color:#fff}.toast.info{background:rgba(124,111,238,0.93);color:#fff}
@keyframes slideUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.stab-bar{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;margin-bottom:11px;scrollbar-width:none}.stab-bar::-webkit-scrollbar{display:none}
.stab{padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--card2);color:var(--text2);font-size:0.73rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.stab.active{border-color:var(--accent);background:rgba(124,111,238,0.15);color:var(--accent)}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}.set-row:last-child{border-bottom:none}
.set-label{font-size:0.86rem;font-weight:600}.set-desc{font-size:0.68rem;color:var(--text2);margin-top:2px}
.pw-wrap{position:relative}.pw-wrap input{padding-right:40px}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);cursor:pointer;font-size:0.88rem;padding:3px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px}
.divider{height:1px;background:var(--border);margin:11px 0}
.empty{text-align:center;padding:26px 12px;color:var(--text2)}.empty .empty-ico{font-size:2rem;margin-bottom:7px}.empty p{font-size:0.84rem}
.cat-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.rec-icon{font-size:0.6rem;background:rgba(245,158,11,0.15);color:#f59e0b;padding:1px 5px;border-radius:7px;margin-left:3px;font-weight:600}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:15px;margin-bottom:9px;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:11px}
.group-card:active{border-color:var(--accent)}
.group-ico{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.group-info{flex:1;min-width:0}.group-name{font-size:0.98rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.group-meta{font-size:0.7rem;color:var(--text2);margin-top:2px}
.group-actions{display:flex;gap:5px;flex-shrink:0}
canvas{max-width:100%}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <button class="hdr-back" id="hdr-back" style="display:none">&#8592;</button>
    <div class="hdr-mid"><div id="hdr-title">SplitKira</div><div id="hdr-sub"></div></div>
    <div class="hdr-right" id="hdr-right"></div>
  </div>
  <div id="content"></div>
  <nav id="bottom-nav">
    <button class="nav-btn" data-page="dashboard"><span class="ico">&#127968;</span>Home</button>
    <button class="nav-btn" data-page="add"><span class="ico">&#43;</span>Add</button>
    <button class="nav-btn" data-page="history"><span class="ico">&#128203;</span>Ledger</button>
    <button class="nav-btn" data-page="balance"><span class="ico">&#9878;&#65039;</span>Balance</button>
    <button class="nav-btn" data-page="settings"><span class="ico">&#9881;&#65039;</span>Settings</button>
  </nav>
</div>
<div id="overlay"><div id="modal-box"></div></div>
<div id="toast-wrap"></div>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/crypto.js"></script>
<script src="js/logic.js"></script>
<script src="js/state.js"></script>
<script src="js/ui.js"></script>
<script src="js/groups.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/add.js"></script>
<script src="js/history.js"></script>
<script src="js/balance.js"></script>
<script src="js/settings.js"></script>
<script src="js/export.js"></script>
<script src="js/sync.js"></script>
<script src="js/router.js"></script>
</body>
</html>
